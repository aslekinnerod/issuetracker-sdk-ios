name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build for iOS
        run: |
          xcodebuild \
            -scheme IssuetrackerSDK \
            -destination 'generic/platform=iOS' \
            build
